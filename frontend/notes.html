<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Page</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="notes-wrapper">
    <h1>📒 NOTES</h1>
    
    <div class="logout">
        <button id="logoutBtn">LOG OUT</button>
    </div>
    
    <div class="notes-card">
        <input type="text" id="noteInput" placeholder="Write your note..." required>
        <button class="add-btn" id="addnoteBtn">+ Add Notes</button>
        
        <p class="error-message" id="errorMessage"></p>

        <p class="empty-state" id="emptyState">--- No notes added yet ---</p>
        
        <div class="notes-list" id="noteList"></div>
    </div>
</div>
    
    <script type="module" src="../js/notes.js"></script>
</body>
</html>
